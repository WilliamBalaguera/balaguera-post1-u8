<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Estudiantes</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        a { margin-right: 8px; }
        h1 { color: #333; }
    </style>
</head>
<body>
<h1>Lista de Estudiantes</h1>
<a href="/estudiantes/nuevo">+ Nuevo Estudiante</a>
<br/><br/>
<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Correo</th>
        <th>Carrera</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${estudiantes}">
        <td th:text="${e.id}"></td>
        <td th:text="${e.nombre}"></td>
        <td th:text="${e.apellido}"></td>
        <td th:text="${e.correo}"></td>
        <td th:text="${e.carrera}"></td>
        <td>
            <a th:href="@{/estudiantes/editar/{id}(id=${e.id})}">✏️ Editar</a>
            <a th:href="@{/estudiantes/eliminar/{id}(id=${e.id})}">🗑️ Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
