<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${titulo}">Formulario</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        div { margin-bottom: 15px; }
        label { display: inline-block; width: 100px; font-weight: bold; }
        input { padding: 6px; width: 300px; }
        span { color: red; font-size: 12px; display: block; margin-left: 105px; }
        button { padding: 8px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
        a { margin-left: 10px; }
        h1 { color: #333; }
    </style>
</head>
<body>
<h1 th:text="${titulo}"></h1>
<form th:action="@{/estudiantes/guardar}" th:object="${estudiante}" method="post">
    <input type="hidden" th:field="*{id}" />
    <div>
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" />
        <span th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></span>
    </div>
    <div>
        <label>Apellido:</label>
        <input type="text" th:field="*{apellido}" />
        <span th:if="${#fields.hasErrors('apellido')}" th:errors="*{apellido}"></span>
    </div>
    <div>
        <label>Correo:</label>
        <input type="email" th:field="*{correo}" />
        <span th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}"></span>
    </div>
    <div>
        <label>Carrera:</label>
        <input type="text" th:field="*{carrera}" />
        <span th:if="${#fields.hasErrors('carrera')}" th:errors="*{carrera}"></span>
    </div>
    <div>
        <button type="submit">Guardar</button>
        <a th:href="@{/estudiantes}">Cancelar</a>
    </div>
</form>
</body>
</html>
